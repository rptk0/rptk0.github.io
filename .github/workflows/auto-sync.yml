name: Auto Sync Repo
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y apt-utils apt-file python3-pip
          pip install requests
      - name: Run sync script
        run: python3 sync.py
      - name: Commit & Push
        run: |
          git config --global user.name "rptk0"
          git config --global user.email "rptk0@users.noreply.github.com"
          git add .
          git commit -m "Auto sync and update repo" || echo "No changes to commit"
          git push
